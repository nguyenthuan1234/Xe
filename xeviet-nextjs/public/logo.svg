<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa" />
      <stop offset="1" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="90" y1="190" x2="420" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#e6edf7" />
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#badgeGrad)" />

  <!-- Soft ground shadow under car -->
  <ellipse cx="256" cy="366" rx="150" ry="16" fill="#0f172a" opacity="0.12" />

  <!-- Motion lines -->
  <rect x="70" y="222" width="46" height="10" rx="5" fill="#ffffff" opacity="0.55" />
  <rect x="60" y="248" width="34" height="10" rx="5" fill="#ffffff" opacity="0.4" />

  <!-- Car cabin (roof) -->
  <path
    d="M172,262 L200,196 Q208,186 222,186 L290,186 Q304,186 312,196 L340,262 Z"
    fill="url(#bodyGrad)"
  />

  <!-- Car body -->
  <rect x="96" y="262" width="320" height="86" rx="26" fill="url(#bodyGrad)" />

  <!-- Windows -->
  <path d="M208,204 L262,204 L262,256 L184,256 Z" fill="#1d4ed8" opacity="0.92" />
  <path d="M274,204 L304,204 L328,256 L274,256 Z" fill="#1d4ed8" opacity="0.92" />
  <rect x="266" y="204" width="6" height="52" fill="url(#bodyGrad)" />

  <!-- Headlight + taillight accents -->
  <circle cx="112" cy="300" r="9" fill="#fbbf24" />
  <circle cx="400" cy="300" r="9" fill="#ef4444" />

  <!-- Door line -->
  <line x1="256" y1="262" x2="256" y2="330" stroke="#c7d2e3" stroke-width="4" stroke-linecap="round" />

  <!-- Wheels -->
  <circle cx="176" cy="350" r="40" fill="#0f172a" />
  <circle cx="176" cy="350" r="16" fill="#cbd5e1" />
  <circle cx="336" cy="350" r="40" fill="#0f172a" />
  <circle cx="336" cy="350" r="16" fill="#cbd5e1" />
</svg>
